---
layout: default
---

<article class="page-article">
  <div class="container page-container">

    <div class="page-header">
      <span class="section-tag mono">{% if page.category %}// {{ page.category | upcase }}{% endif %}</span>
      <h1>{{ page.title }}</h1>

      {% if page.author %}
      <div class="page-byline mono">
        — {{ page.author }}
      </div>
      {% endif %}
    </div>

    <div class="page-content">
      {{ content }}
    </div>

  </div>
</article>
